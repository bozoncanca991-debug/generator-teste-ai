<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>

  <style>
    @page { size: A4; margin: 18mm 16mm 18mm 16mm; }
    body { font-family: "DejaVu Sans", Arial, sans-serif; font-size: 12pt; color: #111; }
    h1 { font-size: 16pt; margin: 0 0 10px 0; }
    .meta { font-size: 9.5pt; color: #555; margin-bottom: 14px; }
    .q { margin: 0 0 14px 0; page-break-inside: avoid; }
    .n { font-weight: 700; margin-right: 6px; }
    .text { white-space: pre-wrap; line-height: 1.4; display: inline; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <div class="meta">Generat la: {{ generated_at }}</div>

  {% for r in rows %}
    <div class="q">
      <span class="n">{{ loop.index }}.</span><span class="text">{{ r.text }}</span>
    </div>
  {% endfor %}

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (window.renderMathInElement) {
        renderMathInElement(document.body, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false},
            {left: "\\(", right: "\\)", display: false},
            {left: "\\[", right: "\\]", display: true}
          ]
        });
      }
    });
  </script>
</body>
</html>

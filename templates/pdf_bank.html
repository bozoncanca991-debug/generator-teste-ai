<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>

  <!-- KaTeX (optional, dacă ai formule) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>

  <style>
    @page {
      size: A4;
      margin: 18mm 16mm 18mm 16mm;
    }
    body {
      font-family: "DejaVu Sans", Arial, sans-serif;
      font-size: 11.5pt;
      color: #111;
    }
    h1 {
      font-size: 16pt;
      margin: 0 0 10px 0;
    }
    .meta {
      font-size: 9.5pt;
      color: #555;
      margin-bottom: 14px;
    }
    .item {
      margin: 0 0 10px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
      page-break-inside: avoid;
    }
    .badge {
      display: inline-block;
      font-size: 9pt;
      padding: 2px 7px;
      border: 1px solid #ddd;
      border-radius: 999px;
      margin-right: 6px;
      color: #333;
    }
    .text {
      margin-top: 6px;
      white-space: pre-wrap; /* păstrează alineatele din text */
      line-height: 1.35;
    }

    /* Footer pagini: Playwright o pune din header/footer template, nu aici */
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <div class="meta">
    Export generat la: {{ generated_at }}
    {% if subtitle %} · {{ subtitle }}{% endif %}
  </div>

  {% for r in rows %}
  <div class="item">
    <div>
      <span class="badge">{{ loop.index }}</span>
      <span class="badge">{{ r.subject }}</span>
      <span class="badge">{{ r.level }}</span>
      <span class="badge">{{ r.difficulty }}</span>
      <span class="badge">{{ r.source }}</span>
    </div>
    <div class="text">{{ r.text }}</div>
  </div>
  {% endfor %}

  <script>
    // randare formule: delimitatori LaTeX uzuali: $...$, $$...$$, \( \), \[ \]
    window.addEventListener("DOMContentLoaded", () => {
      if (window.renderMathInElement) {
        renderMathInElement(document.body, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false},
            {left: "\\(", right: "\\)", display: false},
            {left: "\\[", right: "\\]", display: true}
          ]
        });
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>

  <style>
    @page { size: A4; margin: 20mm; }

    body {
      font-family: "DejaVu Sans", Arial, sans-serif;
      font-size: 12pt;
      color: #111;
    }
    
    .variant-page {
      page-break-after: always;
    }

    .variant-page:last-child {
      page-break-after: auto;
    }

    .header-box {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 0;
      border-bottom: none;
    }

    .test-title {
      font-size: 18pt;
      font-weight: bold;
      margin: 0;
      text-transform: none;
    }

    .test-level {
      font-size: 13pt;
      margin: 6px 0 0 0;
      color: #333;
    }

    .test-subtitle {
      font-size: 14pt;
      font-weight: bold;
      margin: 22px 0 0 0;
      color: #111;
    }
    
    .q {
      margin: 0 0 20px 0;
      page-break-inside: avoid;
    }

    .n {
      font-weight: 700;
      margin-right: 8px;
    }

    .text {
      white-space: pre-wrap;
      line-height: 1.5;
      display: inline;
    }
  </style>
</head>

<body>

  {% for variant in variants %}
  <div class="variant-page">
    <div class="header-box">
      <div class="test-title">{{ title }}</div>
      <div class="test-level">Clasa: {{ level }}</div>
      <div class="test-subtitle">{{ variant.title }}</div>
    </div>

    {% for p in variant.problems %}
      <div class="q">
        <span class="n">{{ loop.index }}.</span><span class="text">{{ p.text }}</span>
      </div>
    {% endfor %}
  </div>
  {% endfor %}

  <script>
    if (typeof renderMathInElement !== "undefined") {
      renderMathInElement(document.body, {
        delimiters: [
          {left: "$$", right: "$$", display: true},
          {left: "$", right: "$", display: false},
          {left: "\\(", right: "\\)", display: false},
          {left: "\\[", right: "\\]", display: true}
        ]
      });
    }
  </script>
</body>
</html>
